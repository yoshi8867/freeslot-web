# Render 단일 웹서비스 — Express가 /api + /healthz + 정적(dist) 모두 서빙.
services:
  - type: web
    name: freeslot-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: '20'
      # 집계 DB(Neon). 값은 Render 대시보드에서 설정(파일에 비밀 미포함). 없으면 트래킹 비활성.
      - key: DATABASE_URL
        sync: false
    # 매직넘버는 기본값(서버 코드)으로 동작. 회전 시 아래를 설정/덮어쓰기:
    # - key: COMCI_ROUTE
    #   value: '36179'
    # - key: COMCI_PREFIX
    #   value: '73629'
